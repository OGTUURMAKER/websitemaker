<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OGT UUR — Вэбсайт & Видео Студи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
    :root { --font-heading: 'Space Grotesk', 'Inter', sans-serif; --font-body: 'Inter', sans-serif; --font-mono: 'JetBrains Mono', monospace; --accent: #7850ff; --accent-2: #ff6496; --accent-3: #50c8ff; --bg: #030308; --bg-card: rgba(13,13,20,0.6); --border: rgba(255,255,255,0.06); --text: #e8e8e8; --text-muted: #666; --glass: rgba(255,255,255,0.04); --radius: 20px; --radius-lg: 32px; --ease-out: cubic-bezier(0.16, 1, 0.3, 1); }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      overflow-x: hidden;
      cursor: default;
    }
    a { text-decoration: none; color: inherit; }

    /* ===== CUSTOM CURSOR ===== */
    .cursor {
      width: 20px; height: 20px;
      border: 2px solid rgba(120, 80, 255, 0.6);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 11000;
      will-change: transform;
      transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .cursor.active {
      width: 48px; height: 48px;
      border-color: rgba(255, 100, 150, 0.7);
    }
    .cursor-dot {
      width: 6px; height: 6px;
      background: rgba(120, 80, 255, 0.9);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 11001;
      will-change: transform;
      transition: opacity 0.3s ease;
      opacity: 0;
    }
    @media (max-width: 1024px) {
      .cursor, .cursor-dot { display: none !important; }
    }

    /* ===== NOISE OVERLAY ===== */
    .noise {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9998;
      opacity: 0.15;
    }
    .gradient-blob {
      position: fixed; border-radius: 50%; pointer-events: none;
      filter: blur(150px); opacity: 0.08; z-index: 0;
      animation: blobFloat 25s ease-in-out infinite;
    }
    .blob-1 { width: 800px; height: 800px; background: var(--accent); top: -300px; right: -200px; }
    .blob-2 { width: 600px; height: 600px; background: var(--accent-2); bottom: -200px; left: -200px; animation-delay: -8s; }
    .blob-3 { width: 500px; height: 500px; background: var(--accent); top: 40%; left: 50%; animation-delay: -15s; }
    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.08; }
      33% { transform: translate(60px, -40px) scale(1.1); opacity: 0.12; }
      66% { transform: translate(-40px, 60px) scale(0.9); opacity: 0.06; }
    }

    /* ===== PRELOADER removed — was causing loading stuck ===== */

    /* ===== NAV ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 1000; padding: 20px 48px;
      display: flex; align-items: center; justify-content: space-between;
      transition: all 0.5s var(--ease-out);
    }
    nav.scrolled {
      background: rgba(3,3,8,0.8);
      backdrop-filter: blur(40px) saturate(1.5);
      -webkit-backdrop-filter: blur(40px) saturate(1.5);
      border-bottom: 1px solid var(--border);
      padding: 14px 48px;
    }
    .nav-logo {
      text-decoration: none;
      display: flex; align-items: center;
      position: relative;
      transition: opacity 0.3s;
    }
    .nav-logo-img { height: 48px; width: auto; flex-shrink: 0; }
    .nav-logo:hover { opacity: 0.8; }
    .nav-links { display: flex; align-items: center; gap: 40px; }
    .nav-links a {
      font-size: 0.82rem; font-weight: 500; color: #888;
      transition: all 0.4s var(--ease-out); position: relative;
      padding: 4px 0;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -2px; left: 50%;
      width: 0; height: 1px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: all 0.4s var(--ease-out);
      transform: translateX(-50%);
    }
    .nav-links a:hover { color: #fff; transform: translateY(-1px); }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta {
      background: linear-gradient(135deg, #7850ff, #5a3fd4);
      color: #fff !important; padding: 10px 24px;
      border-radius: 8px; font-weight: 600; font-size: 0.85rem;
      transition: all 0.3s;
    }
    .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(120,80,255,0.4); }
    .nav-cta::after { display: none !important; }
    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; }
    .hamburger span { display: block; width: 22px; height: 2px; background: #fff; transition: all 0.3s; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 32px; border-radius: 100px;
      font-weight: 600; font-size: 0.88rem;
      cursor: pointer; transition: all 0.4s var(--ease-out); border: none;
      position: relative; overflow: hidden; text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #5a3fd4);
      color: #fff; box-shadow: 0 4px 30px rgba(120,80,255,0.3);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 50px rgba(120,80,255,0.4); }
    .btn-ghost {
      border: 1px solid var(--border); color: #aaa; background: var(--glass);
      backdrop-filter: blur(10px);
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.2); color: #fff; background: rgba(255,255,255,0.06); transform: translateY(-3px); }

    /* ===== HERO — CONVERSION 2026 ===== */
    .hero {
      min-height: 100vh; display: flex; align-items: center;
      position: relative; padding: 120px 48px 80px; overflow: hidden;
    }
    .hero-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .hero-orb {
      position: absolute; border-radius: 50%; filter: blur(140px);
      animation: orbFloat 20s ease-in-out infinite; will-change: transform;
    }
    .orb-1 { width: 700px; height: 700px; background: #7850ff; top: -250px; right: -150px; opacity: 0.08; animation-delay: 0s; }
    .orb-2 { width: 550px; height: 550px; background: #ff6496; bottom: -250px; left: -150px; opacity: 0.06; animation-delay: -7s; }
    .orb-3 { width: 450px; height: 450px; background: #50c8ff; top: 35%; left: 45%; opacity: 0.04; animation-delay: -14s; }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(60px, -40px) scale(1.08); }
      50% { transform: translate(-40px, 60px) scale(0.92); }
      75% { transform: translate(50px, 30px) scale(1.04); }
    }
    .hero-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }
    .hero-glow {
      position: absolute; top: 40%; left: 60%; transform: translate(-50%, -50%);
      width: 800px; height: 800px; border-radius: 50%;
      background: radial-gradient(circle, rgba(120,80,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    /* Hero layout — 40/60 split */
    .hero-inner {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 40px;
      max-width: 1400px; width: 100%; margin: 0 auto;
    }
    /* LEFT: 40% text */
    .hero-text {
      flex: 0 0 40%; max-width: 440px;
      display: flex; flex-direction: column; align-items: flex-start;
    }
    .hero-pill {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 9px 24px; border-radius: 100px;
      background: rgba(120,80,255,0.06); backdrop-filter: blur(12px);
      border: 1px solid rgba(120,80,255,0.12);
      font-size: 0.72rem; font-weight: 600; color: var(--accent);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px;
      opacity: 0; animation: fadeInUp 0.8s ease 0.2s forwards;
      transition: all 0.3s ease;
    }
    .hero-pill:hover { background: rgba(120,80,255,0.1); border-color: rgba(120,80,255,0.2); }
    .hero-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: #7850ff; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
    .hero-title {
      font-family: var(--font-heading);
      font-size: clamp(2.2rem, 4.5vw, 3.6rem); font-weight: 700; line-height: 1.1;
      letter-spacing: -2px; margin-bottom: 20px; color: #fff;
      opacity: 0; animation: fadeInUp 0.8s ease 0.4s forwards;
    }
    .hero-title .gradient {
      background: linear-gradient(135deg, #7850ff 0%, #ff6496 50%, #50c8ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-desc {
      font-size: 1rem; color: #888; max-width: 400px;
      margin-bottom: 36px; line-height: 1.7;
      opacity: 0; animation: fadeInUp 0.8s ease 0.6s forwards;
    }
    .hero-actions {
      display: flex; gap: 12px; flex-wrap: wrap;
      opacity: 0; animation: fadeInUp 0.8s ease 0.8s forwards;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== LAPTOP — 60% ===== */
    .laptop-wrapper {
      flex: 0 0 58%; display: flex; justify-content: center; align-items: center;
      position: relative; perspective: 1400px; min-width: 0;
    }
    .laptop {
      position: relative; width: 100%; max-width: 800px;
      transform: rotateY(-8deg) rotateX(4deg);
      transform-style: preserve-3d;
      animation: laptopFloat 6s ease-in-out infinite;
      will-change: transform;
    }
    @keyframes laptopFloat {
      0%, 100% { transform: rotateY(-8deg) rotateX(4deg) translateY(0); }
      50% { transform: rotateY(-8deg) rotateX(4deg) translateY(-12px); }
    }
    .laptop-screen {
      position: relative; background: #12121e;
      border-radius: 16px 16px 0 0; border: 3px solid #2a2a3e; border-bottom: none;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 30px 80px rgba(0,0,0,0.5), 0 0 120px rgba(120,80,255,0.05);
    }
    .laptop-screen::before {
      content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      width: 8px; height: 8px; border-radius: 50%; background: #333; z-index: 10;
    }
    .laptop-screen::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 50%);
      pointer-events: none; z-index: 5; border-radius: 13px 13px 0 0;
    }
    .laptop-display { width: 100%; height: 0; padding-bottom: 62%; position: relative; overflow: hidden; background: #08080f; }
    .laptop-display-inner { position: absolute; inset: 0; overflow: hidden; }
    /* Mini website inside laptop */
    .mini-site { width: 100%; height: 100%; background: #08080f; }
    .mini-nav {
      height: 8%; background: rgba(8,8,15,0.95); border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: space-between; padding: 0 3%;
    }
    .mini-nav-logo {
      font-family: var(--font-heading); font-size: clamp(7px, 1vw, 12px); font-weight: 700;
      background: linear-gradient(135deg, #7850ff, #ff6496);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 2px;
    }
    .mini-nav-links { display: flex; gap: 3%; }
    .mini-nav-links span { display: block; height: 2px; width: clamp(16px, 2.5vw, 32px); background: rgba(255,255,255,0.15); border-radius: 1px; }
    .mini-nav-cta { padding: 1% 3%; border-radius: 4px; background: linear-gradient(135deg, #7850ff, #5a3fd4); display: flex; align-items: center; }
    .mini-nav-cta span { display: block; height: 1px; width: 100%; background: rgba(255,255,255,0.6); }
    .mini-hero { padding: 5% 3%; display: flex; align-items: center; gap: 3%; }
    .mini-hero-text { flex: 1; }
    .mini-hero-title-1 { font-family: var(--font-heading); font-size: clamp(8px, 1.5vw, 18px); font-weight: 700; color: #fff; line-height: 1.15; margin-bottom: 4px; }
    .mini-hero-title-2 { font-family: var(--font-heading); font-size: clamp(8px, 1.5vw, 18px); font-weight: 700; line-height: 1.15; background: linear-gradient(135deg, #7850ff, #ff6496); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
    .mini-hero-desc { font-size: clamp(4px, 0.55vw, 7px); color: #555; line-height: 1.5; margin-bottom: 8px; max-width: 80%; }
    .mini-hero-btns { display: flex; gap: 2%; }
    .mini-btn-primary { padding: 2% 4%; border-radius: 4px; background: linear-gradient(135deg, #7850ff, #5a3fd4); font-size: clamp(4px, 0.5vw, 7px); color: #fff; font-weight: 600; }
    .mini-btn-ghost { padding: 2% 4%; border-radius: 4px; border: 1px solid rgba(255,255,255,0.08); font-size: clamp(4px, 0.5vw, 7px); color: #777; font-weight: 600; }
    .mini-hero-visual { flex: 0 0 30%; height: clamp(50px, 8vw, 100px); border-radius: 6px; overflow: hidden; position: relative; background: linear-gradient(135deg, rgba(120,80,255,0.12), rgba(255,100,150,0.08)); border: 1px solid rgba(120,80,255,0.15); }
    .mini-cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3%; padding: 2% 3% 0; }
    .mini-card { background: rgba(13,13,20,0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 5px; padding: 8% 5%; }
    .mini-card-icon { width: clamp(10px, 1.2vw, 16px); height: clamp(10px, 1.2vw, 16px); border-radius: 3px; margin-bottom: 3px; }
    .mini-card-icon.purple { background: rgba(120,80,255,0.2); }
    .mini-card-icon.pink { background: rgba(255,100,150,0.2); }
    .mini-card-icon.blue { background: rgba(80,200,255,0.2); }
    .mini-card-title { font-size: clamp(4px, 0.55vw, 8px); font-weight: 700; color: #fff; margin-bottom: 1px; }
    .mini-card-desc { font-size: clamp(3px, 0.4vw, 6px); color: #444; line-height: 1.4; }
    .mini-stats { display: flex; gap: 2%; padding: 2% 3% 3%; }
    .mini-stat { flex: 1; text-align: center; padding: 2% 1%; background: rgba(255,255,255,0.015); border-radius: 4px; border: 1px solid rgba(255,255,255,0.03); }
    .mini-stat-num { font-family: var(--font-heading); font-size: clamp(7px, 0.9vw, 13px); font-weight: 800; margin-bottom: 1px; }
    .mini-stat-num.purple { color: #7850ff; }
    .mini-stat-num.pink { color: #ff6496; }
    .mini-stat-num.cyan { color: #50c8ff; }
    .mini-stat-label { font-size: clamp(3px, 0.35vw, 5px); color: #444; }
    /* Keyboard */
    .laptop-base {
      position: relative; background: linear-gradient(180deg, #2a2a3e 0%, #1a1a28 100%);
      border-radius: 0 0 12px 12px; padding: 1.5% 3% 2.5%;
      box-shadow: 0 15px 50px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .laptop-keyboard { display: grid; grid-template-rows: repeat(5, 1fr); gap: 2%; margin-bottom: 2%; }
    .keyboard-row { display: flex; gap: 1%; }
    .key { flex: 1; height: clamp(3px, 0.35vw, 6px); background: rgba(255,255,255,0.05); border-radius: 1px; }
    .key.space { flex: 4; }
    .laptop-trackpad { width: 22%; height: clamp(8px, 0.9vw, 16px); background: rgba(255,255,255,0.03); border-radius: 3px; margin: 0 auto; }
    .laptop-reflection {
      position: absolute; bottom: -25%; left: 8%; right: 8%; height: 25%;
      background: linear-gradient(180deg, rgba(120,80,255,0.03), transparent);
      transform: scaleY(-1) rotateX(60deg); filter: blur(6px); pointer-events: none; opacity: 0.4;
    }

    /* ===== FLOATING CARDS ===== */
    .float-card {
      position: absolute; background: rgba(10,10,18,0.75); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 10px 14px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 40px rgba(120,80,255,0.04);
      animation: floatCard 5s ease-in-out infinite; z-index: 3; will-change: transform;
    }
    @keyframes floatCard { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .float-card-icon {
      width: 32px; height: 32px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0;
    }
    .float-card-icon.purple { background: rgba(120,80,255,0.12); color: #7850ff; }
    .float-card-icon.pink { background: rgba(255,100,150,0.12); color: #ff6496; }
    .float-card-icon.cyan { background: rgba(80,200,255,0.12); color: #50c8ff; }
    .float-card-icon.yellow { background: rgba(255,216,80,0.12); color: #ffd850; }
    .float-card-label { font-size: 0.55rem; color: #555; margin-bottom: 1px; }
    .float-card-value { font-size: 0.75rem; font-weight: 700; color: #fff; }
    .float-card.top-left { top: 6%; left: -6%; animation-delay: 0s; }
    .float-card.top-right { top: 10%; right: -6%; animation-delay: -1.5s; }
    .float-card.bottom-left { bottom: 14%; left: -4%; animation-delay: -3s; }
    .float-card.bottom-right { bottom: 10%; right: -4%; animation-delay: -2s; }

    /* Scroll indicator */
    .scroll-indicator {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.3;
    }
    .scroll-indicator span { font-size: 0.55rem; color: #444; letter-spacing: 3px; text-transform: uppercase; font-weight: 500; }
    .scroll-line { width: 1px; height: 32px; background: linear-gradient(to bottom, #7850ff, transparent); animation: scrollLine 2s ease-in-out infinite; }
    @keyframes scrollLine { 0%, 100% { transform: scaleY(0.3); opacity: 0.3; } 50% { transform: scaleY(1); opacity: 1; } }

    /* Hero responsive */
    @media (max-width: 1024px) {
      .hero-inner { flex-direction: column; gap: 40px; }
      .hero-text { flex: none; max-width: 100%; align-items: center; text-align: center; }
      .hero-desc { max-width: 100%; }
      .hero-actions { justify-content: center; }
      .laptop-wrapper { flex: none; width: 100%; }
      .laptop { max-width: 600px; transform: rotateY(0) rotateX(2deg); }
      .float-card { display: none; }
    }
    @media (max-width: 768px) {
      .hero { padding: 100px 20px 60px; }
      .hero-title { font-size: 1.8rem; }
      .laptop-screen { border-radius: 10px 10px 0 0; }
      .laptop-base { border-radius: 0 0 8px 8px; }
    }

    /* ===== HERO TRUST ===== */
    .hero-trust {
      display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
      margin-top: 28px; font-size: 0.82rem; color: #666;
      opacity: 0; animation: fadeInUp 0.8s ease 1s forwards;
    }
    .hero-trust span { display: flex; align-items: center; gap: 6px; }
    .hero-trust i { color: var(--accent); font-size: 0.75rem; }

    /* ===== CONTACT SECTION ===== */
    .contact-section { padding: 100px 48px; background: #0a0a12; }
    .contact-container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
    .contact-info h2 { font-family: var(--font-heading); font-size: 2.2rem; font-weight: 700; color: #fff; margin-bottom: 16px; }
    .contact-info p { font-size: 1rem; color: #888; margin-bottom: 36px; line-height: 1.7; }
    .contact-details { display: flex; flex-direction: column; gap: 20px; }
    .contact-item { display: flex; align-items: flex-start; gap: 14px; }
    .contact-item i { width: 40px; height: 40px; border-radius: 10px; background: rgba(120,80,255,0.1); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
    .contact-item strong { color: #fff; font-size: 0.9rem; }
    .contact-item div { color: #888; font-size: 0.85rem; line-height: 1.5; }
    .contact-form-wrap h3 { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 24px; }
    .contact-form { display: flex; flex-direction: column; gap: 14px; }
    .contact-form input, .contact-form textarea {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 14px 18px; color: #fff; font-size: 0.9rem; outline: none;
      transition: border-color 0.3s; font-family: var(--font-body);
    }

    /* ===== CLIENT LOGOS ===== */

    /* ===== BENTO GRID ===== */

    /* ===== BROWSER MOCKUP ===== */

        /* ===== PRICING ===== */

    /* ===== PROCESS (TIMELINE) ===== */

    }

    
    /* ===== SCROLL-DRIVEN ANIMATIONS ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-on-scroll {
      opacity: 0; transform: translateY(40px);
      transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-out);
    }
    .animate-on-scroll.visible {
      opacity: 1; transform: translateY(0);
    }
    .animate-delay-1 { transition-delay: 0.1s; }
    .animate-delay-2 { transition-delay: 0.2s; }
    .animate-delay-3 { transition-delay: 0.3s; }

    /* ===== SCROLL PROGRESS ===== */
    .scroll-progress {
      position: fixed; top: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, #7850ff, #ff6496);
      z-index: 10001; transition: width 0.1s ease;
    }
    /* ===== STICKY CTA ===== */
    .sticky-cta {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      display: flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 100px;
      background: linear-gradient(135deg, var(--accent), #5a3fd4);
      color: #fff; font-weight: 600; font-size: 0.85rem;
      box-shadow: 0 4px 30px rgba(120,80,255,0.4), 0 0 60px rgba(120,80,255,0.15);
      transition: all 0.4s var(--ease-out); cursor: pointer;
      text-decoration: none; border: none;
      backdrop-filter: blur(10px);
    }
    .sticky-cta:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 50px rgba(120,80,255,0.5), 0 0 80px rgba(120,80,255,0.2); }
    @media (max-width: 768px) {
      .sticky-cta { bottom: 16px; right: 16px; padding: 12px 20px; font-size: 0.85rem; }
    }
    /* ===== LANG SWITCHER ===== */
    .lang-switcher {
      display: flex; gap: 4px;
      background: rgba(13,13,20,0.6);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 4px;
      margin-left: 24px;
    }
    .lang-btn {
      padding: 6px 14px; border-radius: 7px;
      font-size: 0.75rem; font-weight: 700;
      background: transparent; color: #666;
      border: none; cursor: pointer;
      transition: all 0.3s;
    }
    .lang-btn.active {
      background: linear-gradient(135deg, #7850ff, #5a3fd4);
      color: #fff;
    }
    .lang-btn:hover:not(.active) {
      color: #fff; background: rgba(255,255,255,0.05);
    }
    @media (max-width: 768px) {
      .lang-switcher { display: none; }
    }
